<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Member Login | Yogastra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
</head>
<body class="d-flex flex-column min-vh-100 bg-section">

    <!-- Authentication pages intentionally have no site nav/header or footer;
         just a clickable brand mark above the form card. -->
    <main class="flex-grow-1 d-flex align-items-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="text-center mb-4">
                        <a href="index.html" class="navbar-brand text-primary fs-3 fw-bold d-inline-flex align-items-center">
                            <i class="fas fa-leaf me-2"></i>Yogastra
                        </a>
                    </div>

                    <div class="bg-white p-4 p-md-5 rounded-4 shadow-lg border-0">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold">Welcome Back</h2>
                            <p class="text-muted small">Sign in to continue to your account.</p>
                        </div>

                        <!-- Login Form -->
                        <form id="loginForm" class="needs-validation" novalidate>
                            <div class="alert alert-danger small d-none" id="loginError">Incorrect email or password. Please try again.</div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" required>
                                <div class="invalid-feedback">Please enter a valid email address.</div>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label d-flex justify-content-between">
                                    Password
                                    <a href="contact.html" class="text-primary small text-decoration-none">Forgot Password?</a>
                                </label>
                                <input type="password" class="form-control" id="password" autocomplete="current-password" required>
                                <div class="invalid-feedback">Please enter your password.</div>
                            </div>
                            <div class="mb-4 form-check">
                                <input type="checkbox" class="form-check-input" id="rememberMe">
                                <label class="form-check-label small text-muted" for="rememberMe">Remember me on this device</label>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Sign In</button>
                        </form>

                        <!-- Social Sign In -->
                        <div class="d-flex align-items-center gap-3 my-4">
                            <hr class="flex-grow-1 my-0">
                            <span class="text-muted small text-nowrap">or continue with</span>
                            <hr class="flex-grow-1 my-0">
                        </div>
                        <div class="d-flex gap-3 mb-4">
                            <button type="button" class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2" id="googleLoginBtn">
                                <i class="fab fa-google"></i> Google
                            </button>
                            <button type="button" class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2" id="appleLoginBtn">
                                <i class="fab fa-apple"></i> Apple
                            </button>
                        </div>
                        <p class="text-muted small text-center mb-0 d-none" id="socialLoginNotice">Social sign-in isn't wired to a real provider in this demo.</p>

                        <div class="text-center mt-3">
                            <p class="small text-muted mb-0">Don't have an account? <a href="register.html" class="fw-bold text-primary">Register here</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const loginError = document.getElementById('loginError');

            // Default demo credentials (shared by everyone for testing this
            // static site). The role is inferred from which email is
            // entered, rather than a separate User/Admin selector.
            const DEFAULT_CREDENTIALS = {
                user: { email: 'sarah.mitchell@example.com', password: 'user123' },
                admin: { email: 'admin@yogastra.com', password: 'admin123' }
            };

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                loginError.classList.add('d-none');

                if (!loginForm.checkValidity()) {
                    e.stopPropagation();
                    loginForm.classList.add('was-validated');
                    return;
                }

                const enteredEmail = emailInput.value.trim().toLowerCase();
                const enteredPassword = passwordInput.value;

                const match = Object.entries(DEFAULT_CREDENTIALS).find(([, creds]) =>
                    creds.email.toLowerCase() === enteredEmail && creds.password === enteredPassword
                );

                if (!match) {
                    loginError.classList.remove('d-none');
                    return;
                }

                const [role] = match;
                window.location.href = role === 'admin' ? '../admin/dashboard.html' : 'dashboard-home.html';
            });

            // Social sign-in (demo only -- no real OAuth provider wired up)
            const socialNotice = document.getElementById('socialLoginNotice');
            ['googleLoginBtn', 'appleLoginBtn'].forEach(id => {
                const btn = document.getElementById(id);
                if (btn) {
                    btn.addEventListener('click', () => {
                        if (socialNotice) socialNotice.classList.remove('d-none');
                    });
                }
            });
        });
    </script>

    <script src="../assets/js/main.js"></script>
</body>
</html>
